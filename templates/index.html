<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ascent scholars - select your course</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ── Parallax Background Layers ── */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        .bg-dark {
            background-color: #000000;
            background-image: url('{{ url_for("static", filename="images/norosBbg.png") }}');
            background-position: center;
        }

        .bg-light {
            background-color: #ffffff;
            background-image: url('{{ url_for("static", filename="images/norosWbg.png") }}');
            background-position: center;
            opacity: 0;
        }
        
        .container {
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
            padding-top: 40px;
        }
        
        .logo {
            margin-bottom: 20px;
        }
        
        .logo img {
            width: 60px;
            height: auto;
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: lowercase;
            color: #ffffff;
        }
        
        .tagline {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
        }

        .user-info {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .user-info a {
            color: #8cc9f0;
            text-decoration: none;
            margin-left: 10px;
        }

        .user-info a:hover {
            text-decoration: underline;
        }
        
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .subject-card {
            background: rgba(10, 10, 10, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            text-decoration: none;
            color: #ffffff;
            backdrop-filter: blur(20px);
            display: block;
        }
        
        .subject-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(140, 201, 240, 0.4);
            background: rgba(20, 20, 20, 0.85);
            border-color: rgba(140, 201, 240, 0.4);
        }
        
        .subject-icon {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80px;
        }
        
        .subject-icon img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }
        
        .subject-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: lowercase;
        }
        
        .subject-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }
            
            .subjects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    
    <!-- Parallax background layers -->
    <div class="bg-layer bg-dark"></div>
    <div class="bg-layer bg-light"></div>
    
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/noros-logo-white.png') }}" alt="noros">
            </div>
            <h1>ascent scholars</h1>
            <p class="tagline">select your course</p>
            {% if user %}
            <p class="user-info">
                welcome, {{ user.name }}
                <a href="/dashboard">dashboard</a>
                <a href="/logout">logout</a>
            </p>
            {% endif %}
        </div>
        
        <div class="subjects-grid">
            {% for key, subject in subjects.items() %}
            <a href="/chat/{{ key }}" class="subject-card">
                <div class="subject-icon">
                    <img src="{{ url_for('static', filename='images/' + subject.icon) }}" alt="{{ subject.name }}">
                </div>
                <div class="subject-name">{{ subject.name|lower }}</div>
                {% if subject.description %}
                <div class="subject-description">{{ subject.description }}</div>
                {% endif %}
            </a>
            {% endfor %}
        </div>
    </div>

</body>
</html>
